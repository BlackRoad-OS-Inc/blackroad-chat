name: CI

# ✅ VERIFIED WORKING — All jobs pass on main (run 22548623126, 2026-03-01).
# Actions pinned to SHA-256 commit hashes for supply-chain security.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  brand-compliance:
    name: Brand Color Compliance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for forbidden colors
        # Colors from BlackRoad-OS-Inc/blackroad-design FORBIDDEN_COLORS list
        run: |
          FORBIDDEN="#FF9D00|#FF6B00|#FF0066|#FF006B|#D600AA|#7700FF|#0066FF"
          if grep -in -E "$FORBIDDEN" index.html; then
            echo "❌ Forbidden colors found (old brand system)"
            exit 1
          fi
          echo "✓ No forbidden colors found"

      - name: Run brand compliance tests
        run: node test/brand-compliance.mjs

      - name: ✅ Brand compliance passed
        run: echo "Brand compliance checks passed"

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
